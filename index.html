<!DOCTYPE html>

    <style>
        :root {
            --neon-green: #00ffcc;
            --gold: #ffd700;
            --overlay: rgba(15, 23, 42, 0.9);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSn4wAZ1ZBGyECTtuOEE9nvxkGGqBLcgWgR3A&s') no-repeat center center fixed;
            background-size: cover;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .lab-container {
            background: var(--overlay);
            backdrop-filter: blur(10px);
            border: 2px solid var(--neon-green);
            padding: 25px;
            border-radius: 20px;
            width: 95%;
            max-width: 900px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
        }

        h1 { text-align: center; color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }
        .status { text-align: center; font-size: 12px; color: var(--gold); margin-bottom: 15px; }

        table { width: 100%; border-collapse: collapse; }
        th { color: var(--neon-green); border-bottom: 2px solid var(--neon-green); padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }

        input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--neon-green);
            color: white;
            padding: 8px;
            border-radius: 5px;
            outline: none;
        }

        .score-input { width: 50px; text-align: center; font-weight: bold; color: var(--gold); }
        
        .qr-section { text-align: center; margin-top: 30px; border-top: 1px solid rgba(0, 255, 204, 0.3); padding-top: 20px; }
        .qr-wrapper { background: white; padding: 10px; display: inline-block; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="lab-container">
        <h1>🧪 7А Ортақ Журналы</h1>
        <div class="status" id="dbStatus">Базаға қосылуда...</div>

        <table>
            <thead>
                <tr>
                    <th>№</th>
                    <th>Оқушы есімі</th>
                    <th>Баға (0-10)</th>
                    <th>Түсініктеме</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>

        <div class="qr-section">
            <p style="font-size: 14px; color: var(--neon-green);">Сайтқа кіру үшін QR-код:</p>

            </div>
        </div>
    </div>

    <script>
        // Сіздің Firebase конфигурацияңыз
        const firebaseConfig = {
            apiKey: "AIzaSyCvv3kBDf-1NtM1qBN2AII9t-YC-B7eDtA",
            authDomain: "ximia-5426c.firebaseapp.com",
            projectId: "ximia-5426c",
            storageBucket: "ximia-5426c.firebasestorage.app",
            messagingSenderId: "985995956819",
            appId: "1:985995956819:web:7e68c7335c354177042ca6",
            databaseURL: "https://ximia-5426c-default-rtdb.firebaseio.com" // Бұл маңызды!
        };

        // Firebase-ті іске қосу
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const students = [
            "Абдіғали Нұрамир", "Абралимова Аяулым", "Абуталип Қорылқа", 
            "Алауатттдин Нұрай", "Алтынбаев Дархан", "Аманқызы Аружан", 
            "Даулетбек Алдияр", "Дүйсехан Әлішер", "Ерболұлы Арсен", 
            "Есмурза Асемай", "Жанузах Мұхаммеджан", "Жұмабай Кебек", 
            "Мирзаев Азиз", "Орналиева Асел", "Хожалепес Ақниет"
        ];

        function createTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            students.forEach((name, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td><strong>${name}</strong></td>
                    <td><input type="number" class="score-input" id="s-${index}" min="0" max="10" onchange="sendData(${index}, '${name}')"></td>
                    <td><input type="text" id="c-${index}" onchange="sendData(${index}, '${name}')" style="width: 90%" placeholder="..."></td>
                `;
                tbody.appendChild(row);
            });
        }

        // Мәліметті базаға жіберу
        window.sendData = function(id, name) {
            const score = document.getElementById(`s-${id}`).value;
            const comment = document.getElementById(`c-${id}`).value;
            db.ref('grades/' + id).set({
                name: name,
                score: score,
                comment: comment
            });
        };

        // Мәліметті базадан нақты уақытта алу
        db.ref('grades').on('value', (snapshot) => {
            const data = snapshot.val();
            document.getElementById('dbStatus').innerText = "🟢 Жүйе онлайн: Деректер жаңартылды";
            if (data) {
                Object.keys(data).forEach(id => {
                    const sInput = document.getElementById(`s-${id}`);
                    const cInput = document.getElementById(`c-${id}`);
                    if (sInput) sInput.value = data[id].score;
                    if (cInput) cInput.value = data[id].comment;
                });
            }
        }, (error) => {
            document.getElementById('dbStatus').innerText = "🔴 Қате: Firebase ережелерін (Rules) тексеріңіз";
        });

        createTable();
    </script>
